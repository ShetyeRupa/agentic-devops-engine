name: AI Multi-Agent Code Review Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main, master ]

jobs:
  ai_review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install and start local LLM
        run: |
          # Install Ollama
          curl -fsSL https://ollama.com/install.sh | sh
          
          # Start Ollama service
          ollama serve &
          sleep 10
          
          # Pull a small model for CI/CD
          ollama pull qwen2.5-coder:1.5b
          
          # Install LiteLLM
          pip install 'litellm[proxy]'
          
          # Start LiteLLM proxy
          litellm --model ollama_chat/qwen2.5-coder:1.5b --port 8000 &
          sleep 10
          
          # Verify LLM is working
          curl http://localhost:8000/health || echo "LLM server started"

      - name: Verify Docker is available
        run: |
          docker --version
          docker ps

      - name: Build Docker sandbox image
        run: |
          docker build -t ai_devops_sandbox . || true

      - name: Run Multi-Agent DevOps Orchestration Loop
        env:
          OPENAI_BASE_URL: http://localhost:8000/v1
          OPENAI_API_KEY: fake
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python src/main.py

      - name: Upload execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-logs
          path: |
            sandbox_source.py
            generated_tests.py
            *.log
          retention-days: 7